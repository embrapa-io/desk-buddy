; ─────────────────────────────────────────────────────────────
;  Desk Buddy — Painel de status Embrapa I/O no CYD (ESP32-2432S028R)
;  Stack: Arduino + TFT_eSPI + LVGL 8.3 + XPT2046_Touchscreen + ArduinoJson 7
;  Toda a configuração da TFT_eSPI vai por build_flags (não precisa editar a lib).
; ─────────────────────────────────────────────────────────────
[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = huge_app.csv   ; 3 MB p/ app (LVGL + TLS não cabem na partição padrão de 1.25 MB)

lib_deps =
    lvgl/lvgl@^8.3.11
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    bblanchon/ArduinoJson@^7.0.4

build_flags =
    ; ---- LVGL: usa o include/lv_conf.h deste projeto ----
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    ; ---- TFT_eSPI para o CYD ESP32-2432S028R (display ILI9341) ----
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
    -D TFT_INVERSION_ON      ; CYD: corrige cores em negativo (fundo escuro / verde correto)
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
