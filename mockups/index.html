<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Desk Buddy — Mockups (CYD 320×240)</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; background:#0b0d10; color:#E6EDF3;
         font-family: system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif; padding:28px; }
  h1 { font-size:18px; margin:0 0 2px; }
  .legend { color:#8B949E; margin:0 0 26px; font-size:13px; }
  .legend code { background:#161B22; padding:1px 6px; border-radius:4px; }
  .gallery { display:flex; flex-wrap:wrap; gap:40px 38px; }
  figure { margin:0; }
  .bezel { background:#1c1f24; padding:14px; border-radius:16px;
           box-shadow:0 10px 30px rgba(0,0,0,.55); width:max-content; }
  figcaption { color:#8B949E; margin-top:12px; font-size:13px; max-width:640px; }
  figcaption b { color:#E6EDF3; }

  /* ---- "tela" física do CYD em 320x240, exibida em 2x ---- */
  .device { width:320px; height:240px; background:#0E1116; border-radius:6px;
            overflow:hidden; zoom:2; display:flex; position:relative; }

  /* ---- menu lateral ---- */
  .nav { width:64px; height:240px; background:#161B22; border-right:1px solid #2D333B;
         display:flex; flex-direction:column; justify-content:space-around; align-items:center;
         box-sizing:border-box; padding:4px 0; }
  .navitem { width:58px; height:42px; border-radius:6px; display:flex; flex-direction:column;
             align-items:center; justify-content:center; gap:3px; color:#8B949E; font-size:8px; }
  .navitem.active { background:#1B2330; color:#3FB950; box-shadow:inset 3px 0 0 #3FB950; }
  .ic { width:17px; height:17px; background-color:currentColor;
        -webkit-mask-repeat:no-repeat; mask-repeat:no-repeat;
        -webkit-mask-position:center; mask-position:center;
        -webkit-mask-size:contain; mask-size:contain; }
  .ic-home { -webkit-mask-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 3 3 11h2v9h6v-6h2v6h6v-9h2z'/></svg>"); mask-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 3 3 11h2v9h6v-6h2v6h6v-9h2z'/></svg>"); }
  .ic-clusters { -webkit-mask-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='5' width='18' height='6' rx='1.5'/><rect x='3' y='13' width='18' height='6' rx='1.5'/></svg>"); mask-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='5' width='18' height='6' rx='1.5'/><rect x='3' y='13' width='18' height='6' rx='1.5'/></svg>"); }
  .ic-hosts { -webkit-mask-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='4' width='18' height='13' rx='1.5'/><rect x='9' y='19' width='6' height='2'/></svg>"); mask-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='4' width='18' height='13' rx='1.5'/><rect x='9' y='19' width='6' height='2'/></svg>"); }
  .ic-serv { -webkit-mask-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='3' width='8' height='8' rx='1.5'/><rect x='13' y='3' width='8' height='8' rx='1.5'/><rect x='3' y='13' width='8' height='8' rx='1.5'/><rect x='13' y='13' width='8' height='8' rx='1.5'/></svg>"); mask-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='3' width='8' height='8' rx='1.5'/><rect x='13' y='3' width='8' height='8' rx='1.5'/><rect x='3' y='13' width='8' height='8' rx='1.5'/><rect x='13' y='13' width='8' height='8' rx='1.5'/></svg>"); }
  .ic-sys { -webkit-mask-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='6' width='18' height='2.2' rx='1.1'/><circle cx='8' cy='7.1' r='3'/><rect x='3' y='16' width='18' height='2.2' rx='1.1'/><circle cx='16' cy='17.1' r='3'/></svg>"); mask-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='6' width='18' height='2.2' rx='1.1'/><circle cx='8' cy='7.1' r='3'/><rect x='3' y='16' width='18' height='2.2' rx='1.1'/><circle cx='16' cy='17.1' r='3'/></svg>"); }

  /* ---- conteúdo ---- */
  .content { flex:1; height:240px; box-sizing:border-box; padding:6px 8px;
             display:flex; flex-direction:column; }
  .hdr { height:22px; display:flex; align-items:center; justify-content:space-between;
         border-bottom:1px solid #2D333B; padding-bottom:4px; }
  .hdr .logo { height:13px; width:auto; display:block; }
  .hdr .right { display:flex; align-items:center; gap:6px; color:#8B949E; font-size:11px; }
  .wifi { display:block; }

  .sub { display:flex; justify-content:space-between; align-items:baseline;
         font-size:10px; margin:6px 0 4px; }
  .sub .t { color:#8B949E; letter-spacing:1.2px; }
  .cnt.up { color:#3FB950; } .cnt.warn { color:#D29922; } .cnt.down { color:#F85149; }

  /* tiles (Visão Geral) */
  .tiles { flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
           gap:8px; margin-top:8px; }
  .tile { background:#161B22; border:1px solid #2D333B; border-radius:8px;
          display:flex; flex-direction:column; align-items:center; justify-content:center;
          text-align:center; gap:2px; }
  .tile .cap { font-size:8px; letter-spacing:1px; color:#8B949E; text-transform:uppercase; }
  .tile .big { font-size:23px; font-weight:700; color:#E6EDF3; line-height:1; }
  .tile .st { font-size:10px; font-weight:600; display:flex; align-items:center; gap:4px; }
  .st.up { color:#3FB950; } .st.warn { color:#D29922; } .st.down { color:#F85149; }
  .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot.up{background:#3FB950}.dot.warn{background:#D29922}.dot.down{background:#F85149}

  /* listas */
  .list { flex:1; overflow:hidden; position:relative; }
  .row { display:flex; align-items:center; gap:7px; height:24px;
         border-bottom:1px solid #21262D; font-size:11px; }
  .row .nm { flex:1; color:#E6EDF3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .ms { color:#8B949E; font-size:10px; }
  .row.down { background:#2A1416; } .row.down .ms { color:#F85149; font-weight:600; }
  .sb { position:absolute; right:0; top:2px; width:3px; height:190px; background:#21262D; border-radius:2px; }
  .sb i { position:absolute; left:0; width:3px; border-radius:2px; background:#3FB950; }

  /* sistema */
  .strip { display:flex; gap:6px; margin:6px 0; }
  .chip { flex:1; background:#161B22; border:1px solid #2D333B; border-radius:6px;
          padding:4px 5px; display:flex; flex-direction:column; gap:1px; }
  .chip .k { font-size:7px; letter-spacing:.6px; color:#8B949E; text-transform:uppercase; }
  .chip .v { font-size:11px; font-weight:700; display:flex; align-items:center; gap:4px; }
  .kv { flex:1; display:grid; grid-template-columns:auto 1fr; row-gap:3px; column-gap:8px;
        font-size:10px; align-content:start; }
  .kv .k { color:#8B949E; } .kv .val { color:#E6EDF3; text-align:right; }
  .bars { display:inline-flex; align-items:flex-end; gap:1px; height:9px; }
  .bars i { width:2px; background:#3FB950; } .bars i.off { background:#3a4350; }
  .acts { display:flex; gap:6px; margin-top:5px; }
  .btn { flex:1; background:#1B2330; border:1px solid #2D333B; border-radius:6px;
         color:#E6EDF3; font-size:9px; text-align:center; padding:4px 0; }

  /* splash */
  .splash { width:320px; height:240px; display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:12px; }
  .splash .emblem { height:58px; }
  .splash .word { width:152px; }
  .splash .tag { font-size:11px; letter-spacing:5px; color:#8B949E; text-transform:uppercase; }
  .pbar { width:150px; height:4px; background:#161B22; border-radius:2px; overflow:hidden; margin-top:4px; }
  .pbar i { display:block; height:100%; width:62%; background:#3FB950; }
  .conn { font-size:9px; color:#8B949E; }
</style>
</head>
<body>
  <h1>Desk Buddy — Mockups das telas</h1>
  <p class="legend">Cheap Yellow Display (ESP32-2432S028R) · 320×240 px · exibido em escala 2× ·
     tema escuro · dados reais do <code>status.embrapa.io</code> (Gatus).</p>

  <div class="gallery">

    <!-- 0 · SPLASH -->
    <figure>
      <div class="bezel"><div class="device"><div class="splash">
        <img class="emblem" src="../assets/embrapa.svg" alt="Embrapa">
        <img class="word" src="../assets/embrapa.io-white.svg" alt="embrapa.io">
        <div class="tag">Desk&nbsp;Buddy</div>
        <div class="pbar"><i></i></div>
        <div class="conn">Conectando ao Wi-Fi…</div>
      </div></div></div>
      <figcaption><b>0 · Splash</b> — exibida no boot/reset: logo da Embrapa + wordmark <i>embrapa.io</i> + status de conexão.</figcaption>
    </figure>

    <!-- 1 · VISÃO GERAL -->
    <figure>
      <div class="bezel"><div class="device">
        <div class="nav">
          <div class="navitem active"><span class="ic ic-home"></span>Geral</div>
          <div class="navitem"><span class="ic ic-clusters"></span>Clusters</div>
          <div class="navitem"><span class="ic ic-hosts"></span>Hosts</div>
          <div class="navitem"><span class="ic ic-serv"></span>Serviços</div>
          <div class="navitem"><span class="ic ic-sys"></span>Sistema</div>
        </div>
        <div class="content">
          <div class="hdr">
            <img class="logo" src="../assets/embrapa.io-white.svg" alt="embrapa.io">
            <div class="right">
              <svg class="wifi" width="14" height="11" viewBox="0 0 16 12"><circle cx="8" cy="9.4" r="1.2" fill="#3FB950"/><path d="M4 6.4a6 6 0 018 0" stroke="#3FB950" stroke-width="1.3" fill="none" stroke-linecap="round"/><path d="M5.6 8a3.4 3.4 0 014.8 0" stroke="#3FB950" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>
              <span>14:03</span>
            </div>
          </div>
          <div class="tiles">
            <div class="tile"><div class="cap">Clusters</div><div class="big">6/6</div><div class="st up"><span class="dot up"></span>Healthy</div></div>
            <div class="tile"><div class="cap">Hosts</div><div class="big">12/12</div><div class="st up"><span class="dot up"></span>Healthy</div></div>
            <div class="tile"><div class="cap">Serviços</div><div class="big">24/25</div><div class="st warn"><span class="dot warn"></span>1 off</div></div>
            <div class="tile"><div class="cap">Geral</div><div class="big">42/43</div><div class="st warn"><span class="dot warn"></span>1 off</div></div>
          </div>
        </div>
      </div></div>
      <figcaption><b>1 · Visão Geral</b> — logo no topo, tiles centralizados, terminologia do Gatus (<i>Healthy</i> / <i>N off</i>). Tile <i>Geral</i> = soma de tudo (42/43).</figcaption>
    </figure>

    <!-- 2 · CLUSTERS -->
    <figure>
      <div class="bezel"><div class="device">
        <div class="nav">
          <div class="navitem"><span class="ic ic-home"></span>Geral</div>
          <div class="navitem active"><span class="ic ic-clusters"></span>Clusters</div>
          <div class="navitem"><span class="ic ic-hosts"></span>Hosts</div>
          <div class="navitem"><span class="ic ic-serv"></span>Serviços</div>
          <div class="navitem"><span class="ic ic-sys"></span>Sistema</div>
        </div>
        <div class="content">
          <div class="hdr">
            <img class="logo" src="../assets/embrapa.io-white.svg" alt="embrapa.io">
            <div class="right"><span>14:03</span></div>
          </div>
          <div class="sub"><span class="t">CLUSTERS</span><span class="cnt up">6/6 · Healthy</span></div>
          <div class="list">
            <div class="row"><span class="dot up"></span><span class="nm">agrodigital1.agro.rocks</span><span class="ms">2 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">agrodigital2.agro.rocks</span><span class="ms">2 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">cloud.agro.rocks</span><span class="ms">3 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">cluster.agro.rocks</span><span class="ms">4 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">storage.agro.rocks</span><span class="ms">2 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">ucb.agro.rocks</span><span class="ms">3 ms</span></div>
          </div>
        </div>
      </div></div>
      <figcaption><b>2 · Clusters</b> — 6 clusters, status + latência.</figcaption>
    </figure>

    <!-- 3 · HOSTS -->
    <figure>
      <div class="bezel"><div class="device">
        <div class="nav">
          <div class="navitem"><span class="ic ic-home"></span>Geral</div>
          <div class="navitem"><span class="ic ic-clusters"></span>Clusters</div>
          <div class="navitem active"><span class="ic ic-hosts"></span>Hosts</div>
          <div class="navitem"><span class="ic ic-serv"></span>Serviços</div>
          <div class="navitem"><span class="ic ic-sys"></span>Sistema</div>
        </div>
        <div class="content">
          <div class="hdr">
            <img class="logo" src="../assets/embrapa.io-white.svg" alt="embrapa.io">
            <div class="right"><span>14:03</span></div>
          </div>
          <div class="sub"><span class="t">HOSTS</span><span class="cnt up">12/12 · Healthy</span></div>
          <div class="list">
            <div class="row"><span class="dot up"></span><span class="nm">api.embrapa.io</span><span class="ms">18 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">bug.embrapa.io</span><span class="ms">22 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">code.embrapa.io</span><span class="ms">19 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">core.embrapa.io</span><span class="ms">15 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">docs.embrapa.io</span><span class="ms">24 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">git.embrapa.io</span><span class="ms">112 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">hit.embrapa.io</span><span class="ms">30 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">iot.embrapa.io</span><span class="ms">27 ms</span></div>
            <div class="sb"><i style="top:0;height:64px"></i></div>
          </div>
        </div>
      </div></div>
      <figcaption><b>3 · Hosts</b> — 12 hosts (rolável), status + latência.</figcaption>
    </figure>

    <!-- 4 · SERVIÇOS -->
    <figure>
      <div class="bezel"><div class="device">
        <div class="nav">
          <div class="navitem"><span class="ic ic-home"></span>Geral</div>
          <div class="navitem"><span class="ic ic-clusters"></span>Clusters</div>
          <div class="navitem"><span class="ic ic-hosts"></span>Hosts</div>
          <div class="navitem active"><span class="ic ic-serv"></span>Serviços</div>
          <div class="navitem"><span class="ic ic-sys"></span>Sistema</div>
        </div>
        <div class="content">
          <div class="hdr">
            <img class="logo" src="../assets/embrapa.io-white.svg" alt="embrapa.io">
            <div class="right"><span>14:03</span></div>
          </div>
          <div class="sub"><span class="t">SERVIÇOS</span><span class="cnt warn">24/25 · 1 off</span></div>
          <div class="list">
            <div class="row down"><span class="dot down"></span><span class="nm">Sentry</span><span class="ms">off</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">API Gateway</span><span class="ms">41 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">Core API</span><span class="ms">58 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">Dashboard</span><span class="ms">33 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">GitLab</span><span class="ms">112 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">Grafana</span><span class="ms">47 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">Matomo</span><span class="ms">29 ms</span></div>
            <div class="row"><span class="dot up"></span><span class="nm">Nginx Proxy Manager</span><span class="ms">21 ms</span></div>
            <div class="sb"><i style="top:0;height:42px"></i></div>
          </div>
        </div>
      </div></div>
      <figcaption><b>4 · Serviços</b> — 25 serviços (rolável). Item fora do ar destacado no topo (<i>off</i>).</figcaption>
    </figure>

    <!-- 5 · SISTEMA -->
    <figure>
      <div class="bezel"><div class="device">
        <div class="nav">
          <div class="navitem"><span class="ic ic-home"></span>Geral</div>
          <div class="navitem"><span class="ic ic-clusters"></span>Clusters</div>
          <div class="navitem"><span class="ic ic-hosts"></span>Hosts</div>
          <div class="navitem"><span class="ic ic-serv"></span>Serviços</div>
          <div class="navitem active"><span class="ic ic-sys"></span>Sistema</div>
        </div>
        <div class="content">
          <div class="hdr">
            <img class="logo" src="../assets/embrapa.io-white.svg" alt="embrapa.io">
            <div class="right"><span>14:03</span></div>
          </div>
          <div class="sub"><span class="t">SISTEMA</span><span class="cnt warn">Plataforma: 1 off</span></div>
          <!-- visão de tudo: 3 grupos -->
          <div class="strip">
            <div class="chip"><span class="k">Clusters</span><span class="v"><span class="dot up"></span>6/6</span></div>
            <div class="chip"><span class="k">Hosts</span><span class="v"><span class="dot up"></span>12/12</span></div>
            <div class="chip"><span class="k">Serviços</span><span class="v"><span class="dot warn"></span>24/25</span></div>
          </div>
          <div class="kv">
            <span class="k">Wi-Fi</span><span class="val">Embrapa-IoT &nbsp;<span class="bars"><i style="height:3px"></i><i style="height:5px"></i><i style="height:7px"></i><i class="off" style="height:9px"></i></span> −58 dBm</span>
            <span class="k">IP</span><span class="val">192.168.0.42</span>
            <span class="k">Atualizado</span><span class="val">há 12 s · a cada 60 s</span>
            <span class="k">Uptime</span><span class="val">2h 14m</span>
            <span class="k">RAM livre</span><span class="val">142 KB</span>
            <span class="k">Brilho (LDR)</span><span class="val">78% · auto</span>
            <span class="k">Firmware</span><span class="val">v0.1-mockup</span>
          </div>
          <div class="acts">
            <div class="btn">↻ Atualizar</div>
            <div class="btn">☀ Brilho</div>
            <div class="btn">⟳ Reiniciar</div>
          </div>
        </div>
      </div></div>
      <figcaption><b>5 · Sistema</b> — visão de tudo: resumo dos 3 grupos + conexão, Gatus, dispositivo e ações (atualizar / brilho / reiniciar).</figcaption>
    </figure>

  </div>
</body>
</html>
